<!DOCTYPE html>
<html>
<head>
    <title>Registered Students</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: white;
            padding: 10px;
            margin: 10px auto;
            width: 50%;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>
    <a href="/">Home</a> | 
<a href="/registered/">Registered</a>
<hr>

<h1>📋 Registered Students</h1>

{% for reg in registrations %}
    <div class="card">
        {{ reg.student_name }} registered for <b>{{ reg.event.name }}</b>
    </div>
{% endfor %}

</body>
</html>
