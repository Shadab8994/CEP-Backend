{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>View Feedbacks</title>

    <link rel="stylesheet" href="{% static 'events/style.css' %}">
</head>

<body>

<!-- 🔹 NAVBAR -->
<div class="navbar">

    <div class="logo">
        🎓 Event Portal
    </div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/registered/">Registered</a>
        <a href="/view-feedback/">Feedbacks</a>
        <a href="/admin/">Admin</a>
    </div>

    <div class="user-info">
        👤 {{ request.user.username }}

        <a href="{% url 'logout' %}">
            Logout
        </a>
    </div>

</div>


<!-- 🔹 TITLE -->
<h1 class="main-title">
    📋 Student Feedbacks
</h1>


<!-- 🔹 FEEDBACK CONTAINER -->
<div class="events-container">

{% for feedback in feedbacks %}

    <div class="event-card">

        <div class="event-title">
            {{ feedback.student_name }}
        </div>

        <div class="event-info">
            💬 {{ feedback.message }}
        </div>

    </div>

{% empty %}

    <div class="event-card">
        <div class="event-info">
            No feedbacks available
        </div>
    </div>

{% endfor %}

</div>

</body>
</html>
