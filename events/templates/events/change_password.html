{% load static %}

<!doctype html>
<html>
  <head>
    <title>Change Password</title>

    <link rel="stylesheet" href="{% static 'events/style.css' %}" />
  </head>

  <body>
    <!-- 🔹 NAVBAR -->

    <div class="navbar">
      <div class="logo">Event Portal</div>

      <div class="nav-links">
        <a href="/">Home</a>
      </div>
    </div>

    <!-- 🔹 CENTER CARD -->

    <div class="add-event-container">
      <div class="add-event-card">
        <h1>🔒 Change Password</h1>

        <form method="POST">
          {% csrf_token %}

          <input
            type="password"
            name="old_password"
            placeholder="Current Password"
            required
          />
          

          <input
            type="password"
            name="new_password1"
            placeholder="New Password"
            required
          />
          

          <input
            type="password"
            name="new_password2"
            placeholder="Confirm New Password"
            required
          />

          <div class="form-buttons">
            <button type="submit">Update Password</button>

            <a href="/" class="cancel-btn"> Cancel </a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
